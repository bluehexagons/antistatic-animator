<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP allows:
        - self for scripts / styles
        - inline styles (Vite + React inline)
        - data: URIs for inline SVG cursors / images
        - Google Fonts (Inter)
      In Electron we load via file:// which counts as self.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self' ws: wss:;"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Droid+Sans+Mono&display=swap"
      rel="stylesheet"
      type="text/css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        background: #14171c;
        color: #e6eaf2;
        font-family:
          'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
    </style>
    <title>Antistatic Animator</title>
  </head>
  <body>
    <div id="main"></div>
    <script type="module" src="/src/react.tsx"></script>
  </body>
</html>
